spring:
  application:
    name: telco-ticket-analyzer
  servlet:
    session:
      cookie:
        same-site: lax
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mydatabase}
    username: ${DB_USER:myuser}
    password: ${DB_PASSWORD:12345}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
